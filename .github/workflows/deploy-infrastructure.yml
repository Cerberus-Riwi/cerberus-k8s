name: Deploy Infrastructure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to K3s Cluster
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote working directory
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ~/cerberus-k8s/k8s"

      - name: Copy manifests to master node
        run: |
          scp -r k8s/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/cerberus-k8s/

      - name: Apply namespace
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && kubectl apply -f ~/cerberus-k8s/k8s/base/namespace.yaml"

      - name: Apply ConfigMaps
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            if ls ~/cerberus-k8s/k8s/base/configmaps/*.yaml 2>/dev/null; then
              kubectl apply -f ~/cerberus-k8s/k8s/base/configmaps/
            else
              echo "No ConfigMaps found, skipping."
            fi
          EOF

      - name: Cleanup previous RabbitMQ release
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl delete statefulset rabbitmq -n cerberus 2>/dev/null || true
            kubectl delete service rabbitmq -n cerberus 2>/dev/null || true
            kubectl delete service rabbitmq-headless -n cerberus 2>/dev/null || true
          EOF

      - name: Deploy RabbitMQ
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl apply -f ~/cerberus-k8s/k8s/infrastructure/rabbitmq/rabbitmq.yaml
          EOF

      - name: Apply RabbitMQ topology
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl delete job rabbitmq-topology-setup -n cerberus --ignore-not-found=true
            kubectl apply -f ~/cerberus-k8s/k8s/infrastructure/rabbitmq/topology-setup-job.yaml
          EOF

      - name: Apply application manifests
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            for service in security-gate vulnerability-service code-quality-service qualitygate-service analytics frontend; do
              dir=~/cerberus-k8s/k8s/services/$service
              if ls $dir/*.yaml 2>/dev/null; then
                echo "Applying $service..."
                kubectl apply -f $dir/
              else
                echo "No manifests for $service, skipping."
              fi
            done
          EOF

      - name: Apply Ingress
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            if ls ~/cerberus-k8s/k8s/infrastructure/ingress/*.yaml 2>/dev/null; then
              kubectl apply -f ~/cerberus-k8s/k8s/infrastructure/ingress/
            else
              echo "No Ingress manifests found, skipping."
            fi
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            echo "=== Nodes ==="
            kubectl get nodes
            echo "=== Namespace cerberus ==="
            kubectl get all -n cerberus
          EOF