apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cerberus-routes
  namespace: cerberus
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/auth`)
      kind: Rule
      priority: 100
      services:
        - name: security-gate
          port: 5275
    - match: PathPrefix(`/api/scan/webhook/result`)
      kind: Rule
      priority: 100
      services:
        - name: security-gate
          port: 5275
    - match: PathPrefix(`/api/scan`)
      kind: Rule
      priority: 50
      middlewares:
        - name: forward-auth
      services:
        - name: security-gate
          port: 5275
    - match: PathPrefix(`/api/v1/vulnerabilities`)
      kind: Rule
      priority: 50
      middlewares:
        - name: forward-auth
      services:
        - name: vulnerability-service
          port: 5114
    - match: PathPrefix(`/api/quality-gate`)
      kind: Rule
      priority: 50
      middlewares:
        - name: forward-auth
      services:
        - name: qualitygate-service
          port: 5004
    - match: PathPrefix(`/api/codequality`)
      kind: Rule
      priority: 50
      middlewares:
        - name: forward-auth
      services:
        - name: code-quality-service
          port: 5003
    - match: PathPrefix(`/api/ai`)
      kind: Rule
      priority: 50
      middlewares:
        - name: forward-auth
      services:
        - name: analytics
          port: 8000
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: frontend
          port: 80
