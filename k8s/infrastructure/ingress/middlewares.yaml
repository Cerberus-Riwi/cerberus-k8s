apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: cerberus
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - OPTIONS
    accessControlAllowHeaders:
      - Authorization
      - Content-Type
    accessControlAllowOriginList:
      - http://localhost:5173
      - http://localhost:5174
      - http://localhost:5175
      - https://cerberus.jaramc.dev
    accessControlMaxAge: 86400
    addVaryHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: cerberus
spec:
  forwardAuth:
    address: http://security-gate.cerberus.svc.cluster.local:5275/api/auth/me
    authResponseHeaders:
      - X-User-Id
      - X-User-Email
      - X-User-Role
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: n8n-stripprefix
  namespace: cerberus
spec:
  stripPrefix:
    prefixes:
      - /n8n
