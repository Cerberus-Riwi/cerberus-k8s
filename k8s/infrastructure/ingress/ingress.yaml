# IngressRoute — reemplaza el Ingress estándar para soportar middlewares Traefik.
# Antes de aplicar, eliminar el Ingress anterior:
#   kubectl delete ingress cerberus-ingress -n cerberus
# Luego aplicar en orden:
#   kubectl apply -f middlewares.yaml -n cerberus
#   kubectl apply -f ingress.yaml -n cerberus

apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: cerberus-gateway
  namespace: cerberus
spec:
  entryPoints:
    - web
  routes:

    # ── Público — sin validación de token ─────────────────────────────────────
    - match: PathPrefix(`/api/auth`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: security-headers
      services:
        - name: security-gate
          port: 5275

    # ── Protegidos — requieren JWT válido ─────────────────────────────────────
    - match: PathPrefix(`/api/scan`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: security-gate
          port: 5275

    - match: PathPrefix(`/api/v1/vulnerabilities`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: vulnerability-service
          port: 5114

    - match: PathPrefix(`/api/codequality`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: code-quality-service
          port: 5003

    - match: PathPrefix(`/api/quality-gate`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: qualitygate-service
          port: 5004

    # cerberus-ml — KPIs analytics
    - match: PathPrefix(`/api/kpis`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: analytics
          port: 8000

    # cerberus-ml — AI chat (Azure OpenAI)
    - match: PathPrefix(`/api/ai`)
      kind: Rule
      middlewares:
        - name: rate-limit
        - name: jwt-auth
        - name: security-headers
      services:
        - name: analytics
          port: 8000

    # ── Herramientas internas ─────────────────────────────────────────────────
    - match: PathPrefix(`/n8n`)
      kind: Rule
      middlewares:
        - name: rate-limit
      services:
        - name: n8n
          port: 5678

    # ── Frontend — catch-all ──────────────────────────────────────────────────
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend
          port: 80
