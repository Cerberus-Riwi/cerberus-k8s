apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-gate
  namespace: cerberus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-gate
  template:
    metadata:
      labels:
        app: security-gate
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: security-gate
          image: ghcr.io/cerberus-riwi/security-gate:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5275
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:5275"
            - name: ConnectionStrings__Default
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: RabbitMQ__Host
              value: "rabbitmq.cerberus.svc.cluster.local"
            - name: RabbitMQ__Port
              value: "5672"
            - name: RabbitMQ__User
              value: "$(RABBITMQ_DEFAULT_USER)"
            - name: RabbitMQ__Password
              value: "$(RABBITMQ_DEFAULT_PASS)"
          envFrom:
            - configMapRef:
                name: cerberus-config
            - secretRef:
                name: rabbitmq-secret
            - secretRef:
                name: azure-postgres-secret
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: securitygate-jwt
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5275
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5275
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: security-gate
  namespace: cerberus
spec:
  selector:
    app: security-gate
  ports:
    - port: 5275
      targetPort: 5275
  type: ClusterIP