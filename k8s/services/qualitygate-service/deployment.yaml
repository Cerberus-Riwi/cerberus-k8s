apiVersion: apps/v1
kind: Deployment
metadata:
  name: qualitygate-service
  namespace: cerberus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qualitygate-service
  template:
    metadata:
      labels:
        app: qualitygate-service
    spec:
      serviceAccountName: qualitygate-sa
      containers:
        - name: qualitygate-service
          image: ghcr.io/cerberus-riwi/qualitygate-service:latest
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: cerberus-config
            - secretRef:
                name: rabbitmq-secret
            - secretRef:
                name: azure-postgres-secret
            - secretRef:
                name: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: qualitygate-service
  namespace: cerberus
spec:
  selector:
    app: qualitygate-service
  ports:
    - port: 5004
      targetPort: 5004
  type: ClusterIP