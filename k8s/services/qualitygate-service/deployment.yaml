apiVersion: apps/v1
kind: Deployment
metadata:
  name: qualitygate-service
  namespace: cerberus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qualitygate-service
  template:
    metadata:
      labels:
        app: qualitygate-service
    spec:
      serviceAccountName: qualitygate-sa
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: qualitygate-service
          image: ghcr.io/cerberus-riwi/qualitygate-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:5004"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_PASSWORD
            - name: DB_CONNECTION_STRING
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: RABBITMQ_HOST
              value: "rabbitmq.cerberus.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          envFrom:
            - configMapRef:
                name: cerberus-config
            - secretRef:
                name: rabbitmq-secret
            - secretRef:
                name: azure-postgres-secret
            - secretRef:
                name: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: qualitygate-service
  namespace: cerberus
spec:
  selector:
    app: qualitygate-service
  ports:
    - port: 5004
      targetPort: 5004
  type: ClusterIP