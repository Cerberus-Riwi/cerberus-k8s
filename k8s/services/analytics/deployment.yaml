
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: cerberus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: ghcr.io/cerberus-riwi/analytics-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rabbitmq-secret
            - secretRef:
                name: azure-postgres-secret
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: ai-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: cerberus
spec:
  selector:
    app: analytics
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP