apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: cerberus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: analytics
          image: ghcr.io/cerberus-riwi/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_HOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_PORT
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_NAME
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: azure-postgres-secret
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              value: "rabbitmq.cerberus.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          envFrom:
            - configMapRef:
                name: cerberus-config
            - secretRef:
                name: rabbitmq-secret
            - secretRef:
                name: azure-postgres-secret
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: ai-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/kpis/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/kpis/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: cerberus
spec:
  selector:
    app: analytics
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP